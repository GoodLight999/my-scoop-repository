name: Sync Manifests

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 手動でも即時実行可能

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate / Update / Delete manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANAGED_REPOS: ${{ vars.MANAGED_REPOS }}
        run: python scripts/generate_manifest.py

      - name: Commit & Push（変更があれば）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/
          if git diff --cached --quiet; then
            echo "変更なし。スキップ。"
          else
            git commit -m "chore: auto-sync manifests [skip ci]"
            git push
          fi
